name: Build Leafish

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  linux:
    name: Linux Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            clang \
            pkg-config \
            libssl-dev \
            libz-dev \
            libudev-dev \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxext-dev \
            libgl1-mesa-dev \
            libvulkan-dev \
            vulkan-tools \
            mesa-vulkan-drivers

      - name: Build (release)
        run: cargo build --release

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: leafish-linux
          path: target/release/leafish

  windows:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: leafish-windows
          path: target/release/leafish.exe
